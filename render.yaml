services:
  - type: web
    name: chen12413-buildflow-api
    runtime: docker
    plan: free
    region: singapore
    rootDir: api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: off
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite+pysqlite:///./buildflow.db
      - key: LLM_PROVIDER
        value: mock
      - key: LLM_MODEL
        value: mock-buildflow-v1
      - key: LLM_API_MODE
        value: auto

  - type: web
    name: chen12413-buildflow-web
    runtime: docker
    plan: free
    region: singapore
    rootDir: web
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: off
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: ""
      - key: API_PROXY_TARGET
        fromService:
          name: chen12413-buildflow-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
